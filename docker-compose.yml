services:
  postgres:
    image: postgres:17-alpine
    container_name: norrdesk-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_URL:?Set DATABASE_URL in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
